[alembic]
# Paths are resolved relative to this .ini file (%(here)s), not the CWD, so
# `make migrate` works when run from the repo root (see Makefile).
script_location = %(here)s/../app/db/migrations
prepend_sys_path = %(here)s/..
sqlalchemy.url = postgresql+psycopg://cliniq:cliniq@localhost:5432/cliniq
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
